# .github/workflows/ci.yml
name: CI
on: [push, pull_request, workflow_dispatch]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Lean/Lake セットアップ & .lake キャッシュ
      - uses: leanprover/lean-action@v1

      - name: Show versions
        run: |
          lake env lean --version
          lake --version

      - name: Resolve deps
        run: |
          time -p lake update

      - name: Fetch mathlib olean cache
        run: |
          time -p lake exe cache get

      - name: Build (canary + full)
        run: |
          # （CI/Smoke.lean を置いているなら）カナリアも併走
          if [ -f CI/Smoke.lean ] || [ -f CI/Smoke/lean ]; then
            time -p lake build CI.Smoke || true
          fi
          time -p lake build

      - name: Upload build log on failure
        if: failure()
        run: |
          echo "Check previous step logs in the Actions UI (grouped output)."
