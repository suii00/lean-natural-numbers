name: CI
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Elan (Lean のバージョンマネージャ) を入れる
      - name: Install elan (Lean toolchain)
        run: |
          curl -L https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
          bash elan-init.sh -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
          lean --version
          lake --version

      # .lake ディレクトリをキャッシュ（依存の再ダウンロード抑制）
      - name: Cache .lake
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-${{ runner.os }}-${{ hashFiles('lake-manifest.json', 'lakefile.lean', 'lean-toolchain') }}
          restore-keys: |
            lake-${{ runner.os }}-

      - name: Resolve deps
        run: lake update

      # mathlib などの precompiled olean を取得（高速化のキモ）
      - name: Get mathlib cache
        run: lake exe cache get

      - name: Build
        run: lake build
